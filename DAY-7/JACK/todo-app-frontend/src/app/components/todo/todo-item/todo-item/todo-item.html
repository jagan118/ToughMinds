 <div class="todo-card" [class.completed]="todo.completed">
      <!-- Checkbox -->
      <input
        type="checkbox"
        class="checkbox"
        [checked]="todo.completed"
        (change)="onToggle()"
        [attr.aria-label]="'Mark ' + todo.title + ' as done'"
      />

      <!-- Content -->
      <div class="content">
        <div class="main">
          <h3 class="title" [class.line-through]="todo.completed">
            {{ todo.title }}
          </h3>

          <p class="description">
            {{ todo.description ? todo.description : 'No description provided' }}
          </p>
        </div>

        <div class="bottom-row">
          <div class="meta">
            <span class="due-date">
              📅 {{ todo.dueDate ? formatDate(todo.dueDate) : 'No due date' }}
            </span>
            <span class="category">
              🏷️ {{ todo.category ? todo.category : 'No category' }}
            </span>
          </div>

          <span class="status" [class.pending]="!todo.completed" [class.done]="todo.completed">
            {{ todo.completed ? '✓ Done' : '○ Pending' }}
          </span>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button
          class="btn-edit"
          (click)="onEdit()"
          title="Edit"
          aria-label="Edit todo"
        >
          ✏️
        </button>
        <button
          class="btn-delete"
          (click)="onDelete()"
          title="Delete"
          aria-label="Delete todo"
        >
          🗑️
        </button>
      </div>
    </div>
