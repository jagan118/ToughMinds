<!-- src/app/app.component.html -->

<!-- Show navbar only on protected routes -->
<app-navbar *ngIf="showNavbar"></app-navbar>

<!-- Loading state -->
<div *ngIf="loading" class="loading-screen">
  <div class="spinner"></div>
  <p>Loading...</p>
</div>

<!-- Main content -->
<main *ngIf="!loading">
  <router-outlet></router-outlet>
</main>
