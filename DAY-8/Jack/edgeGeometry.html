<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Wireframe Box</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #111;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import * as THREE from "three";

      // 1. Scene Setup
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111115); // Dark sleek background

      // 2. Camera Setup
      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 0, 15); // Positioned directly in front

      // 3. Renderer Setup
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      // 4. Lighting
      const frontLight = new THREE.DirectionalLight(0xffffff, 1.5);
      frontLight.position.set(0, 0, 20);
      scene.add(frontLight);

      const sideLight = new THREE.DirectionalLight(0x00ff00, 0.5);
      sideLight.position.set(5, 5, 2);
      scene.add(sideLight);

      const ambientLight = new THREE.AmbientLight(0x333333);
      scene.add(ambientLight);

      // 5. Create Wireframe Box
      const box = new THREE.BoxGeometry(4, 4, 4); 
      const geometry = new THREE.EdgesGeometry(box); 
      
      // Lines require LineBasicMaterial instead of Mesh materials
      const material = new THREE.LineBasicMaterial({ 
          color: 0x00ff00 
      });
      
      // Combine geometry and material into LineSegments
      const edge = new THREE.LineSegments(geometry, material);
      scene.add(edge); // Add it to the world

      // 6. Handle Window Resize dynamically
      window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // 7. Animation Loop
      function animate() {
        requestAnimationFrame(animate);
        
        // Spin the wireframe box smoothly so you can see it in 3D space
        edge.rotation.x += 0.005;
        edge.rotation.y += 0.01;

        renderer.render(scene, camera);
      }
      animate();
    </script>
  </body>
</html>
