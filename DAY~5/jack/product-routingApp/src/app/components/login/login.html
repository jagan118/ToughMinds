<div class="login-container">
  <div class="login-box">
    <h1>Admin Login</h1>

    <div class="form-group">
      <label>Username:</label>
      <input [(ngModel)]="username" type="text" placeholder="Enter username" />
    </div>

    <div class="form-group">
      <label>Password:</label>
      <input [(ngModel)]="password" type="password" placeholder="Enter password" />
    </div>

    <button (click)="login()" class="btn" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>

    <p class="hint">Demo: Any username/password works</p>
  </div>
</div>
